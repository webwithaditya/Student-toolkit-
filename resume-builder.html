<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder - Student Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="light-mode">
    <nav>
        <div class="logo">
            <i class="fas fa-graduation-cap"></i> Student<span>Toolkit</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#tools">Tools</a>
            <a href="index.html#about">About</a>
            <a href="index.html#feedback">Feedback</a>
        </div>
        <div class="nav-actions">
            <button id="theme-toggle" class="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
            <div class="menu-toggle" id="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="tool-container reveal" style="background: var(--card-current); border: var(--glass-border); backdrop-filter: blur(20px); padding: 3rem; border-radius: var(--radius); box-shadow: var(--shadow); position: relative; overflow: hidden;">
            <div class="tool-header">
                <div style="background: rgba(99, 102, 241, 0.1); color: var(--primary); padding: 6px 14px; border-radius: 100px; display: inline-block; font-weight: 600; margin-bottom: 15px; font-size: 0.8rem;">📄 Career Accelerator</div>
                <h1 style="font-size: 3rem; letter-spacing: -0.02em; font-weight: 800; margin-bottom: 10px;">Resume <span style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Builder</span></h1>
                <p style="color: #64748b; font-size: 1.1rem;">Craft a world-class professional resume in minutes.</p>
            </div>

            <form id="resume-form" class="resume-form-grid">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label>Professional Summary</label>
                    <textarea id="summary" placeholder="Enthusiastic computer science student with a focus on web development..." style="height: 80px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>LinkedIn URL</label>
                    <input type="url" id="linkedin" placeholder="https://linkedin.com/in/johndoe">
                </div>
                <div class="form-group">
                    <label>GitHub/Portfolio URL</label>
                    <input type="url" id="github" placeholder="https://github.com/johndoe">
                </div>
                <div class="form-group">
                    <label>Education</label>
                    <textarea id="education" placeholder="Bachelor of Science in Computer Science..." style="height: 100px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Skills</label>
                    <textarea id="skills" placeholder="JavaScript, Python, UI Design..." style="height: 100px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Projects</label>
                    <textarea id="projects" placeholder="Student Toolkit Website: A premium platform for students using Vanilla JS..." style="height: 120px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Certifications</label>
                    <textarea id="certs" placeholder="Google UX Design, AWS Cloud Practitioner..." style="height: 120px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Languages</label>
                    <input type="text" id="languages" placeholder="English (Fluent), Hindi (Native), Spanish (Basic)">
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label>Work Experience</label>
                    <textarea id="experience" placeholder="Software Intern at XYZ Corp..." style="height: 150px;"></textarea>
                </div>
                
                <div style="grid-column: 1 / -1; text-align: center; margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; max-width: 400px; padding: 1.2rem; border-radius: 100px; background: var(--primary-gradient); border: none; font-weight: 800; font-size: 1.1rem; box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.4);">🚀 Generate Premium Resume</button>
                </div>
            </form>

            <div id="resume-preview">
                <div id="preview-content">
                    <!-- Generated resume will appear here -->
                </div>
                <div style="text-align: center; margin-top: 30px;" class="no-print">
                    <button onclick="window.print()" class="btn btn-primary">Download as PDF</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="no-print">
        <div class="footer-socials">
            <a href="https://instagram.com/webwithaditya" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://youtube.com/@webwithaditya" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://t.me/webwithaditya" target="_blank"><i class="fab fa-telegram"></i></a>
        </div>
        <p>Connect with <b>webwithaditya</b> for more amazing tools!</p>
        <p style="font-size: 0.9rem; margin-top: 10px; color: #64748b;">&copy; 2026 Student Toolkit. Built with ❤️ for students.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        const form = document.getElementById('resume-form');
        const preview = document.getElementById('resume-preview');
        const previewContent = document.getElementById('preview-content');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const summary = document.getElementById('summary').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const linkedin = document.getElementById('linkedin').value;
            const github = document.getElementById('github').value;
            const education = document.getElementById('education').value;
            const skills = document.getElementById('skills').value;
            const projects = document.getElementById('projects').value;
            const certs = document.getElementById('certs').value;
            const languages = document.getElementById('languages').value;
            const experience = document.getElementById('experience').value;

            previewContent.innerHTML = `
                <div style="border-bottom: 2px solid #6366f1; padding-bottom: 20px; margin-bottom: 30px; text-align: center;">
                    <h1 style="font-size: 2.7rem; margin-bottom: 5px;">${name}</h1>
                    <div style="color: #64748b; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
                        <span><i class="fas fa-envelope"></i> ${email}</span>
                        ${linkedin ? `<span><i class="fab fa-linkedin"></i> LinkedIn</span>` : ''}
                        ${github ? `<span><i class="fab fa-github"></i> Portfolio</span>` : ''}
                    </div>
                </div>

                ${summary ? `
                <div style="margin-bottom: 30px;">
                    <h2 style="color: #6366f1; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 10px;">Summary</h2>
                    <p style="white-space: pre-line;">${summary}</p>
                </div>` : ''}
                
                <div style="margin-bottom: 30px;">
                    <h2 style="color: #6366f1; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 10px;">Education</h2>
                    <p style="white-space: pre-line;">${education}</p>
                </div>

                <div style="margin-bottom: 30px;">
                    <h2 style="color: #6366f1; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 10px;">Skills</h2>
                    <p>${skills}</p>
                </div>

                ${projects ? `
                <div style="margin-bottom: 30px;">
                    <h2 style="color: #6366f1; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 10px;">Projects</h2>
                    <p style="white-space: pre-line;">${projects}</p>
                </div>` : ''}

                ${certs ? `
                <div style="margin-bottom: 30px;">
                    <h2 style="color: #6366f1; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 10px;">Certifications</h2>
                    <p style="white-space: pre-line;">${certs}</p>
                </div>` : ''}

                ${languages ? `
                <div style="margin-bottom: 30px;">
                    <h2 style="color: #6366f1; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 10px;">Languages</h2>
                    <p>${languages}</p>
                </div>` : ''}

                <div style="margin-bottom: 30px;">
                    <h2 style="color: #6366f1; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 10px;">Work Experience</h2>
                    <p style="white-space: pre-line;">${experience}</p>
                </div>
            `;

            preview.style.display = 'block';
            preview.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
